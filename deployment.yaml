apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-devops-deployment   # you can name anything meaningful
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-devops
  template:
    metadata:
      labels:
        app: aceest-devops
    spec:
      containers:
      - name: aceest-container
        image: akshaysalamwade/aceest-app:v1
        ports:
        - containerPort: 5000