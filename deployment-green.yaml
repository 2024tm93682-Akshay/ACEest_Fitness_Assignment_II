apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-green
  template:
    metadata:
      labels:
        app: aceest-green
    spec:
      containers:
      - name: aceest-container
        image: akshaysalamwade/aceest-app:v2
        ports:
        - containerPort: 5000